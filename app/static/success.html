<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — pdf2image.online</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F4F6FA; color: #1A2132;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      background: #4A7FD4; padding: 0 32px; height: 56px;
      display: flex; align-items: center;
    }
    .nav-logo { color: #fff; font-size: 1.2rem; font-weight: 700; text-decoration: none; }

    main {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 16px;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
      padding: 48px 40px; max-width: 480px; width: 100%; text-align: center;
    }
    .icon { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
    p  { color: #6B7A99; line-height: 1.6; margin-bottom: 28px; }

    .download-btn {
      display: inline-block; padding: 14px 36px;
      background: #4A7FD4; color: #fff;
      font-weight: 700; font-size: 1rem;
      border-radius: 10px; text-decoration: none;
      transition: background .15s;
    }
    .download-btn:hover { background: #3A6FC4; }

    .loading { color: #6B7A99; font-size: .95rem; }
    .error   { color: #EF4444; font-size: .95rem; }

    footer {
      text-align: center; padding: 24px;
      color: #6B7A99; font-size: .85rem;
      border-top: 1px solid #DDE3EE;
    }
  </style>
</head>
<body>

<nav style="background:#fff;border-bottom:1px solid #DDE3EE;padding:0 32px;height:64px;display:flex;align-items:center;">
  <a href="/"><img src="/logo.png" alt="pdf2image.online" style="height:40px;" /></a>
</nav>

<main>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Thank you for your purchase!</h1>
    <p>Your payment was successful. Click below to download the PDFtoIMG desktop app for Windows.</p>

    <div id="content">
      <p class="loading">Verifying payment…</p>
    </div>
  </div>
</main>

<footer>© 2026 PDFtoIMG</footer>

<script>
  const params    = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");

  async function verify() {
    if (!sessionId) {
      document.getElementById("content").innerHTML =
        '<p class="error">No session found. Please contact support.</p>';
      return;
    }
    try {
      const res  = await fetch(`/api/stripe/session?session_id=${sessionId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Payment not verified.");
      const dlUrl = `/api/download/${data.download_token}`;
      document.getElementById("content").innerHTML =
        `<a class="download-btn" href="${dlUrl}" download>⬇ Download PDFtoIMG.zip</a>
         <p style="margin-top:12px;color:#6B7A99;font-size:.85rem;">Link expires after 24 hours.</p>`;
    } catch (e) {
      document.getElementById("content").innerHTML =
        `<p class="error">⚠ ${e.message}</p>`;
    }
  }

  verify();
</script>
</body>
</html>
